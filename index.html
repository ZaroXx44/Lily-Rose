<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lily-Rose & Keryan</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/emoji/160/heart-suit.png">

    <style>
        :root { 
            --couleur-texte: #4a001e; 
            --fond-carte: rgba(255, 255, 255, 0.4); 
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body { 
            /* Ton design de dégradé animé */
            background: linear-gradient(var(--angle, 0deg), #ff9a9e, #fad0c4, #ffd1ff, #feb47b);
            background-size: 400% 400%;
            
            /* Alignement du contenu */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            color: var(--couleur-texte); 
            
            /* Protection du contenu via safe-area (ta demande) */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            
            /* Box-sizing pour éviter que le padding n'agrandisse le body */
            box-sizing: border-box;
            
            -webkit-user-select: none;
            user-select: none;
        }

        /* Anti-scroll */
        #scroll-lock {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999;
            pointer-events: none;
        }

        .bg-hearts { position: absolute; width: 100%; height: 100%; z-index: 0; }
        .floating-heart { 
            position: absolute; 
            opacity: 0; 
            animation: float 15s linear infinite, fadeIn 3s ease-in forwards; 
            font-size: 22px; 
        }
        
        @keyframes float { 
            0% { transform: translateY(110vh) rotate(0deg); } 
            100% { transform: translateY(-20vh) rotate(360deg); } 
        }
        @keyframes fadeIn { to { opacity: 0.25; } }

        .card { 
            position: relative; 
            z-index: 10; 
            background: var(--fond-carte); 
            backdrop-filter: blur(25px) saturate(160%); 
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            padding: 24px; 
            border-radius: 38px; 
            border: 0.5px solid rgba(255, 255, 255, 0.7); 
            width: 82%; 
            max-width: 300px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(122, 0, 54, 0.1); 
        }

        h1 { font-size: 22px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        .tag { font-size: 11px; font-weight: 600; margin-bottom: 22px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1.5px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .box { background: rgba(255, 255, 255, 0.25); padding: 14px 0; border-radius: 18px; }
        .box span { display: block; font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; }
        .box p { margin: 0; font-size: 10px; font-weight: 600; opacity: 0.6; }

        .ev { margin-top: 20px; background: rgba(122, 0, 54, 0.06); padding: 12px; border-radius: 16px; font-size: 12px; color: #7a0036; }
        .ev b { color: #d63384; font-weight: 700; }
        .footer { margin-top: 18px; font-size: 10px; opacity: 0.4; font-weight: 500; }
    </style>
</head>
<body>

    <div id="scroll-lock"></div>
    <div class="bg-hearts" id="h"></div>

    <div class="card">
        <h1>Lily-Rose & Keryan</h1>
        <div class="tag">Pour Toujours</div>
        
        <div class="grid">
            <div class="box"><span id="d">0</span><p>jours</p></div>
            <div class="box"><span id="hr">00</span><p>heures</p></div>
            <div class="box"><span id="m">00</span><p>minutes</p></div>
            <div class="box"><span id="s">00</span><p>secondes</p></div>
        </div>

        <div id="ec" class="ev">Synchronisation...</div>
        <div class="footer">Depuis le 30 octobre 2024</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCKOyjFQB-Q1CJTN2sOBP37NiSpnDNllO0",
            authDomain: "compteur-a91b1.firebaseapp.com",
            databaseURL: "https://compteur-a91b1-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "compteur-a91b1",
            storageBucket: "compteur-a91b1.firebasestorage.app",
            messagingSenderId: "970871414423",
            appId: "1:970871414423:web:87d07f6ed151c164e513d2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });

        let serverOffset = 0;
        const offsetRef = ref(db, ".info/serverTimeOffset");
        onValue(offsetRef, (snap) => { serverOffset = snap.val() || 0; });

        const startDate = new Date("2024-10-30T14:30:00").getTime();
        const events = [
            { name: "St Valentin 🌹", month: 1, day: 14 },
            { name: "Anniv Keryan 🎂", month: 3, day: 10 },
            { name: "Anniv Lily-Rose 🎂", month: 5, day: 30 },
            { name: "Notre Anniversaire ❤️", month: 9, day: 30 }
        ];

        function update() {
            const now = Date.now() + serverOffset;
            const diff = now - startDate;

            const angle = (now / 50) % 360;
            document.body.style.setProperty('--angle', angle + 'deg');

            if (diff >= 0) {
                document.getElementById('d').innerText = Math.floor(diff/864e5);
                document.getElementById('hr').innerText = Math.floor((diff%864e5)/36e5).toString().padStart(2,'0');
                document.getElementById('m').innerText = Math.floor((diff%36e5)/6e4).toString().padStart(2,'0');
                document.getElementById('s').innerText = Math.floor((diff%6e4)/1e3).toString().padStart(2,'0');
                
                const currentDate = new Date(now);
                const today = new Date(currentDate.getFullYear(), currentDate.getMonth(), currentDate.getDate());
                
                let next = null, min = 366;
                events.forEach(e => {
                    let d = new Date(currentDate.getFullYear(), e.month, e.day);
                    if (d < today) d.setFullYear(d.getFullYear() + 1);
                    let diffDays = Math.ceil((d - today) / 864e5);
                    if (diffDays < min) { min = diffDays; next = e; }
                });

                if(next) {
                    document.getElementById("ec").innerHTML = min === 0 
                        ? `<b>C'est aujourd'hui !</b><br>${next.name}` 
                        : `<b>${next.name}</b> dans ${min} jour${min>1?'s':''}`;
                }
            }
            requestAnimationFrame(update);
        }

        const emojis = ['💖', '🤍', '🌸', '✨'];
        for(let i=0; i<12; i++) {
            let h = document.createElement('div'); h.className='floating-heart';
            h.innerText = emojis[Math.floor(Math.random()*4)];
            h.style.left = Math.random()*100+'vw';
            h.style.animationDelay = (Math.random() * -15) + 's';
            document.getElementById('h').appendChild(h);
        }

        requestAnimationFrame(update);
    </script>
</body>
</html>
