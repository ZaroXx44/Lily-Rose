<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lily-Rose & Keryan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background: #121212; 
            color: white; 
            padding-top: 100px; 
            
            /* EMPECHER LE SCROLL */
            margin: 0;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
            touch-action: none;
        }
        #compteur { font-size: 10rem; margin: 20px; color: #00ff88; }
        button { font-size: 1.5rem; padding: 15px 30px; cursor: pointer; border-radius: 10px; border: none; background: #00ff88; color: black; font-weight: bold; }
        button:hover { background: #00cc6e; }
    </style>
</head>
<body>

    <h1>Compteur Partagé</h1>
    <div id="compteur">Chargement...</div>
    <button id="btnAjouter">+ 1</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // TA CONFIGURATION FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCKOyjFQB-Q1CJTN2sOBP37NiSpnDNllO0",
            authDomain: "compteur-a91b1.firebaseapp.com",
            databaseURL: "https://compteur-a91b1-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "compteur-a91b1",
            storageBucket: "compteur-a91b1.firebasestorage.app",
            messagingSenderId: "970871414423",
            appId: "1:970871414423:web:87d07f6ed151c164e513d2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const compteurRef = ref(db, 'ma_valeur');

        onValue(compteurRef, (snapshot) => {
            const valeur = snapshot.val() || 0;
            document.getElementById('compteur').innerText = valeur;
        });

        document.getElementById('btnAjouter').onclick = () => {
            runTransaction(compteurRef, (currentValue) => {
                return (currentValue || 0) + 1;
            });
        };

        // BLOCAGE DU SCROLL TACTILE
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
